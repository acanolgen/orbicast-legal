<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Orbicast — Legal</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #05070b; color: #e8f6fb;
  }
  .bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(circle at 12% 8%, rgba(34,211,238,.20), transparent 42%),
      radial-gradient(circle at 88% 92%, rgba(147,51,234,.18), transparent 46%),
      #05070b;
  }
  .card { text-align: center; padding: 40px 28px; }
  .brand { font-size: 14px; letter-spacing: 4px; font-weight: 800; color: #5eead4; text-transform: uppercase; }
  h1 { font-size: 34px; font-weight: 800; margin: 10px 0 6px; }
  p { color: #8aa0ab; margin: 0 0 28px; }
  .links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  a.btn {
    text-decoration: none; color: #05070b; font-weight: 700; font-size: 15px;
    padding: 13px 22px; border-radius: 14px;
    background: linear-gradient(90deg, #22d3ee, #5eead4);
    box-shadow: 0 8px 24px rgba(34,211,238,.35);
  }
  a.ghost {
    background: transparent; color: #bdeefb; border: 1px solid rgba(94,234,212,.4);
    box-shadow: none;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="brand">Orbicast</div>
  <h1>Legal</h1>
  <p>Cinematic 3D drone flyovers of anywhere on Earth.</p>
  <div class="links">
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn ghost" href="terms.html">Terms of Use</a>
    <a class="btn ghost" href="support.html">Support</a>
  </div>
</div>
</body>
</html>
